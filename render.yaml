# Render Deployment Configuration for Backend
# Deploys backend as a Web Service

services:
  - type: web
    name: pridefit-backend
    env: node
    plan: free
    
    # Build: install all dependencies
    buildCommand: "cd backend && npm install"
    
    # Start: run production server
    startCommand: "cd backend && npm start"
    
    healthCheckPath: /
    autoDeploy: true
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        value: mongodb://marcdarylladress_db_user:WmY8YKVUcoLNd1Y0@cluster0.u1mmbmk.mongodb.net:27017/pridefitgym?retryWrites=true&w=majority&ssl=true
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://web-prog-gymnation-ten.vercel.app
      - key: BASE_URL
        value: https://web-prog-gymnation.onrender.com
      # Optional: Cloudinary for persistent file storage (uncomment to enable)
      # - key: CLOUDINARY_CLOUD_NAME
      #   value: your-cloud-name
      # - key: CLOUDINARY_API_KEY
      #   value: your-api-key
      # - key: CLOUDINARY_API_SECRET
      #   value: your-api-secret
