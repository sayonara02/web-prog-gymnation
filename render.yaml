# Render Deployment Configuration for Backend
# Deploys backend as a Web Service

services:
  - type: web
    name: pridefit-backend
    env: node
    plan: free
    
    # Build: install all dependencies (including dev for building)
    buildCommand: "cd backend && npm install"
    
    # Start: run production server
    startCommand: "cd backend && npm start"
    
    healthCheckPath: /
    autoDeploy: true
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these in Render dashboard (do not commit secrets):
      # - key: MONGODB_URI
      #   value: mongodb+srv://<user>:<pass>@cluster.mongodb.net/pridefitgym?retryWrites=true&w=majority
      # - key: JWT_SECRET
      #   generateValue: true
      # - key: CORS_ORIGIN
      #   value: https://your-app.vercel.app
      # - key: BASE_URL
      #   value: https://your-backend.onrender.com
      # Optional: Cloudinary for persistent file storage
      # - key: CLOUDINARY_CLOUD_NAME
      #   value: your-cloud-name
      # - key: CLOUDINARY_API_KEY
      #   value: your-api-key
      # - key: CLOUDINARY_API_SECRET
      #   value: your-api-secret
